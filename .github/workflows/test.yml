name: Foundry CI

on:
  push:
    branches: ["master", "main"]
  pull_request:
    branches: ["master", "main"]

jobs:
  test:
    name: Run Foundry Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Foundry
        uses: foundry-rs/foundry-toolchain@v1
        with:
          version: nightly

      - name: Compile contracts
        run: forge build --sizes

      - name: Run unit and fuzz tests
        run: forge test -vv --no-match-path "src/MyTokenInvariant.t.sol"
        env:
          ETH_RPC_URL: ${{ secrets.ETH_RPC_URL }}

      - name: Run invariant tests
        run: forge test -vv --match-path "src/MyTokenInvariant.t.sol"

      - name: Generate gas report
        run: forge test --gas-report --no-match-path "src/MyTokenInvariant.t.sol"
        env:
          ETH_RPC_URL: ${{ secrets.ETH_RPC_URL }}

      - name: Generate coverage report
        run: forge coverage --report summary
        env:
          ETH_RPC_URL: ${{ secrets.ETH_RPC_URL }}

      - name: Run Slither analysis
        uses: crytic/slither-action@v0.4.0
        with:
          target: src/
          slither-args: --exclude-dependencies
        continue-on-error: true
